# fmriflow slim — orchestrator only.
#
# fmriprep is delegated to the host's docker daemon by mounting
# /var/run/docker.sock. Configure your preproc YAML with
# `container_type: docker` and `container: nipreps/fmriprep:24.1.1`.
#
# For the standalone variant (FreeSurfer + fmriprep baked in), use:
#   docker compose -f docker-compose.full.yml up
#
# For apptainer-on-host instead of docker-out-of-docker, see
# docs/guide/docker.md.
#
# Two host paths matter:
#   - $FMRIFLOW_HOME (default ~/projects/fmriflow) holds configs,
#     addons, runs, stores, secrets, and the user's subjects.json.
#   - $FMRIFLOW_DATA (optional; default $FMRIFLOW_HOME/data) holds
#     BIDS, DICOMs, derivatives, work, and results — split it onto
#     a separate disk if you want.

services:
  fmriflow:
    container_name: fmriflow
    build:
      context: .
      dockerfile: docker/Dockerfile.slim
      args:
        PUID: ${PUID:-1000}
        PGID: ${PGID:-1000}
    image: fmriflow:slim
    ports:
      - "8421:8421"
    environment:
      FMRIFLOW_HOME: /workspace
      # Optional: uncomment to put $FMRIFLOW_DATA on a separate disk.
      # FMRIFLOW_DATA: /data
      FS_LICENSE: /workspace/secrets/freesurfer-license.txt
      FS_LICENSE_TEXT: ${FS_LICENSE_TEXT:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      # The user's working directory ($FMRIFLOW_HOME).
      # Set FMRIFLOW_HOME on the host to point this anywhere; the
      # default is ~/projects/fmriflow.
      - ${FMRIFLOW_HOME:-~/projects/fmriflow}:/workspace
      # Optional: separate big-data mount. Uncomment + set
      # FMRIFLOW_DATA on the host to a RAID/NAS path.
      # - ${FMRIFLOW_DATA:-~/projects/fmriflow-data}:/data
      # docker-out-of-docker for fmriprep. Comment this line if you
      # are using apptainer-on-host instead.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
