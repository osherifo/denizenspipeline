name: Frontend tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  schedule:
    # Nightly live-backend smoke at 06:00 UTC.
    - cron: '0 6 * * *'

defaults:
  run:
    working-directory: frontend

jobs:
  unit:
    name: Vitest (unit + component + view)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

  e2e-mocked:
    name: Playwright (mocked backend)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  e2e-live:
    name: Playwright (live fmriflow serve)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
        working-directory: ${{ github.workspace }}
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Boot fmriflow serve against synthetic fixture
        run: |
          fmriflow serve --testing-fixture &
          npx wait-on http://127.0.0.1:8421/api/health -t 60000
        working-directory: ${{ github.workspace }}
      - run: npm run test:e2e:live
