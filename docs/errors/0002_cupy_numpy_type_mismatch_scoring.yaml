id: 2
title: MKR model fails with "Unsupported type <class 'numpy.ndarray'>" when using cupy backend
date: 2026-03-05
author: Omar Sherif
stage: model
tags: [cupy, numpy, backend, type-mismatch, multiple-kernel-ridge, scoring]

symptoms: |
  Stage 'model' failed: Unsupported type <class 'numpy.ndarray'>

  Traceback passes through _score_predictions and ends in:
    cupy._core._kernel._preprocess_arg:145
    TypeError: Unsupported type <class 'numpy.ndarray'>

  Occurs only when model.params.backend is set to "cupy" or "torch_cuda".

root_cause: |
  When himalaya runs with the cupy backend, mkr.predict() returns a cupy
  array. The preprocessed Y_test is a plain numpy array. When
  _score_predictions tries to compute R² between Y_pred (cupy) and Y_test
  (numpy), cupy rejects the numpy operand in its ufunc dispatch.

fix: |
  Convert Y_pred to numpy before passing it to _score_predictions:

    Y_pred = mkr.predict(K_test)
    if hasattr(Y_pred, 'get'):  # cupy array -> numpy
        Y_pred = Y_pred.get()

  Applied in himalaya.py inside MultipleKernelRidgeModel.fit().

config_note: |
  This only triggers when backend: cupy (or torch_cuda) is set in
  model.params. With backend: numpy or no backend specified, predict()
  returns a numpy array and no conversion is needed.

status: verified
