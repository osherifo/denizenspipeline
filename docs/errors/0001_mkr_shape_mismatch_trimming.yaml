id: 1
title: MKR model fails with "Inconsistent number of samples" due to unequal trimming of responses and features
date: 2026-03-05
author: Omar Sherif
stage: model
tags: [shape-mismatch, trimming, himalaya, multiple-kernel-ridge, preprocessing]

symptoms: |
  Stage 'model' failed: Inconsistent number of samples.

  Traceback:
    ...himalaya/kernel_ridge/_sklearn_api.py, line 910, in fit
      raise ValueError("Inconsistent number of samples.")
    ValueError: Inconsistent number of samples.

  X_train (features) had 3737 rows but Y_train (responses) had 3787 rows — a
  difference of 50 TRs across 10 training runs.

root_cause: |
  The raw response data (PHACT HDF files) and the feature data (grouped HDF
  files) had different numbers of TRs per run. The DefaultPreprocessor applied
  the same trim_start/trim_end to both domains. Since the raw arrays started
  at different lengths, after trimming they still had different row counts.

  The reference notebook avoided this because it used pre-processed,
  already-aligned response data (preprocdata.npz) rather than raw PHACT HDF
  responses. In the notebook only features were trimmed with X[10:-5];
  responses were already the right length.

fix: |
  Switched MKR configs from the default preprocessor to the pipeline
  preprocessor, which allows separate trim steps per domain:

    preprocessing:
      type: pipeline
      steps:
        - name: split
        - name: trim
          params: {trim_start: 10, trim_end: 10, targets: [responses]}
        - name: trim
          params: {trim_start: 10, trim_end: 5, targets: [features]}
        - name: zscore
        - name: concatenate

  Delays were moved from preprocessing to model.params.delays, since MKR
  applies delays per-group inside ColumnKernelizer.

  The per-domain trim overrides (trim_response_start, trim_feature_start, etc.)
  that were temporarily added to DefaultPreprocessor were removed — the pipeline
  preprocessor is the correct solution for this use case.

config_note: |
  When responses and features have different raw TR counts, you MUST use the
  pipeline preprocessor with separate trim steps. The default preprocessor
  applies a single trim_start/trim_end to both domains and cannot correct
  per-domain length differences.

references:
  - "Commit that added pipeline preprocessor support for MKR configs"
  - "Original reference: encoding_fit.ipynb — uses pre-aligned preprocdata.npz"
