id: 3
title: ColumnKernelizer gets 0-column slices because delays_applied defaults to True
date: 2026-03-05
author: Omar Sherif
stage: model
tags: [delays_applied, group-slices, column-kernelizer, pipeline-preprocessor, multiple-kernel-ridge, banded-ridge]

symptoms: |
  Stage 'model' failed: Found array with 0 feature(s) (shape=(3737, 0)) while a
  minimum of 1 is required.

  The error comes from himalaya's Kernelizer.fit_transform inside
  ColumnKernelizer, when one of the per-group sub-arrays has 0 columns.

root_cause: |
  _compute_group_slices uses delays_applied to decide slice widths:
    - delays_applied=True  → width = dim * len(delays)
    - delays_applied=False → width = dim

  Both BandedRidgeModel and MultipleKernelRidgeModel read:
    delays_applied = data.metadata.get('delays_applied', True)

  The pipeline preprocessor (without a delay step) does not set
  'delays_applied' in metadata, so the default of True kicks in. The model
  then computes slices as if each feature group is dim*10 columns wide, but
  the actual X_train only has sum(feature_dims) columns (no delays). The
  oversized slices quickly exceed the real column count, leaving later groups
  with empty (0-column) arrays.

fix: |
  1. Changed the default from True to False in both model classes:
       delays_applied = data.metadata.get('delays_applied', False)

     This is safe because the default preprocessor always explicitly sets the
     key, so it never relies on the fallback.

  2. Made the delay preprocessing step set the flag when it runs:
       state.metadata['delays_applied'] = True

     This ensures that if a pipeline config DOES include a delay step, the
     models will correctly see delays_applied=True.

config_note: |
  When using the pipeline preprocessor for MKR (no delay step), the model
  receives un-delayed data and applies delays per-group via ColumnKernelizer.
  The metadata must correctly reflect that delays have NOT been applied by the
  preprocessor.

status: pending_verification
